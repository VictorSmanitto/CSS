<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Escreva seu CSS Aqui */
    .flag {
        background-color: red;
        width: 900px;
        height: 600px;
        position: relative;
    }
    .flag > div {
        width: 900px;
        height: 300px;
        background-color: darkblue;
        position: absolute;
        top: 150px;
    }
    .flag > div > div{
        background-color: white;
        position: relative;
        border-radius: 50%;
        width: 200px;
        height: 200px;
        left: 350px;
        top: -20px;
    }
    .flag > p{
        color:white;
        font-size: 60px;
        text-align: center;
    }
    .flag div div p{
        color:black;
        font-size: 70px;
        text-align: center;
    }
  </style>
</head>

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
