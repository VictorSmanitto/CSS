<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Escreva seu CSS Aqui 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    Para os tamanhos, verifique as instruções.
    HINT: Lembre-se você não consegue alterar as propriedades das linhas de um GRID.
    Mas as linhas de um Grid são transparentes!
    */
body{
    margin: 0;
    background-color: gray;
}
.conteiner{
    width: 748px;
    height: 748px;
    display: grid;
    grid-template-columns: 320px 198px 153px 50px;
    grid-template-rows: 414px 130px 150px 20px;
    gap: 9px;
    
}
.yellow{
    background-color: yellow;
    grid-column: 2;
    grid-row: 4;
}
.red{
    background-color: red;
    grid-column: 1;
    grid-row: 1;
}
.black{
    background-color: black;
    grid-column: 3;
    grid-row: 4;
}
.blue{
    background-color: blue;
    grid-column: 4;
    grid-row: 2;
    margin-bottom: 10px;
}
.white{
    background-color: white;
}
.w1{
    grid-column: 2 / 5;
    grid-row: 1;
}
.w2{
    grid-column: 1;
    grid-row: 2 / 4;
}
.w3{
    grid-column: 2 / 4;
    grid-row: 2 / 4;
}
.w4{
    grid-column: 4;
    grid-row: 3 / 5;
}
.w5{
    grid-column: 1;
    grid-row: 4;
}
  </style>
</head>

<body>
  <!-- Escreva seu HTML Aqui -->
   <div class="conteiner">

        <div class="red"></div>
        <div class="white w1"></div>

        <div class="white w3"></div>
        <div class="white w2"></div>
        <div class="blue"></div>


        <div class="white w5"></div>
        <div class="white w4"></div>
        <div class="yellow"></div>
        <div class="black"></div>

   </div>
</body>

</html>
